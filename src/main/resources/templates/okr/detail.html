<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>KR 세부</title>

  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/components.css}">
  <link rel="stylesheet" th:href="@{/css/theme-forest.css}">
  <link rel="stylesheet" th:href="@{/css/pages/okr-detail.css}">
</head>

<body class="page-okr okr-detail">
<div class="wrap">

  <h1 class="title" th:text="${detail.keyResultContent}">핵심 결과 내용</h1>

  <div class="sub">
    <span class="ddayLabel">D-Day</span>
    <span class="ddayValue"
         >D-0</span>
  </div>

  <div class="sub">
    <span class="range"
          th:text="|${#temporals.format(detail.weekStart,'MM.dd')} ~ ${#temporals.format(detail.weekEnd,'MM.dd')}|">
      09.08 ~ 09.14
    </span>
  </div>

  <!-- 다른 KR 이동 -->
  <div class="viewTabs">
    <div class="tabLeft">
      <span class="tabBtn active">주/월 진행 상황</span>
    </div>

    <div class="krJump" th:if="${krOptions != null}">

      <!-- 1) 드롭다운 이동 전용 form -->
      <form th:action="@{/okr/kr/go}" method="get" class="kr-jump-form">
        <span class="selectWrap">
          <select class="krSelect" name="id" id="krSelect">
            <option th:each="kr : ${krOptions}"
                    th:value="${kr.id}"
                    th:selected="${kr.id == detail.keyResultId}"
                    th:text="${#strings.abbreviate(kr.content, 24)}">
              KR 내용
            </option>
          </select>
        </span>

        <button type="submit" class="tabBtn">다른 KR 보기</button>
      </form>

      <!-- 2) 이전 / 다음 이동 전용 -->
      <div class="krNav">
        <a th:if="${prevKrId != null}"
           th:href="@{/okr/kr/go(id=${prevKrId})}"
           class="tabBtn">이전</a>
        <span th:if="${prevKrId == null}"
              class="tabBtn disabled-tab">이전</span>

        <a th:if="${nextKrId != null}"
           th:href="@{/okr/kr/go(id=${nextKrId})}"
           class="tabBtn">다음</a>
        <span th:if="${nextKrId == null}"
              class="tabBtn disabled-tab">다음</span>
      </div>

    </div>
  </div>

  <!-- 주간 보기만 사용 -->
  <div class="viewBox">
    <div class="stats">
      <div class="percent">
        <span th:text="${detail.percent}">0</span>% 달성
      </div>
      <div class="muted">
        <span th:text="${detail.checkedCount}">0</span> / 7 일
      </div>
    </div>

    <div class="bars">
      <div class="bar"
           th:each="d : ${detail.days}"
           th:classappend="${detail.checkedDays.contains(d)} ? ' done' : ''">
        <div class="label" th:text="${#temporals.format(d, 'E')}">월</div>
      </div>
    </div>

    <section id="stats" style="margin-top:16px;">
      <h3 style="margin:8px 0;">통계</h3>

      <div class="kcard">
        <div class="kpi">
          <strong>이번 주 달성률</strong>
          <span th:text="|${detail.percent}%|">0%</span>
        </div>

        <div class="barline">
          <div class="barfill"
               th:style="|width:${detail.percent}%;|"></div>
        </div>

        <div class="delta">
          이번 주 체크:
          <span th:text="|${detail.checkedCount}일|">0일</span>
        </div>
      </div>
    </section>
  </div>

  <!-- ===== 월 달력 ===== -->
  <div class="monthCard" th:if="${monthDetail != null}">

    <div class="monthHead">
      <h3 class="monthTitle">
        <span th:text="${monthDetail.year}">2026</span>년
        <span th:text="${monthDetail.month}">3</span>월
      </h3>

      <div class="monthNav">
        <a class="btn"
           th:href="@{/okr/kr/{id}(id=${detail.keyResultId}, year=${monthDetail.prevYear}, month=${monthDetail.prevMonth})}">
          ← 이전달
        </a>
        <a class="btn"
           th:href="@{/okr/kr/{id}(id=${detail.keyResultId}, year=${monthDetail.nextYear}, month=${monthDetail.nextMonth})}">
          다음달 →
        </a>
      </div>
    </div>

    <!-- 요일 헤더 -->
    <div class="monthWeekdays">
      <div>일</div>
      <div>월</div>
      <div>화</div>
      <div>수</div>
      <div>목</div>
      <div>금</div>
      <div>토</div>
    </div>

    <!-- 달력 본문 -->
    <div class="monthRows">
      <div class="monthRow" th:each="week : ${monthDetail.weeks}">

        <th:block th:each="cell : ${week}">

          <!-- 이전달/다음달 -->
          <div th:if="${!cell.currentMonth}"
               class="monthCell otherMonth">
            <div class="monthDay" th:text="${cell.dayOfMonth}">1</div>
          </div>

          <!-- 현재달 + 오늘 + 체크 -->
          <div th:if="${cell.currentMonth and cell.today and cell.checked}"
               class="monthCell today checked">
            <div class="monthDay" th:text="${cell.dayOfMonth}">1</div>
            <div class="checkDot"></div>
          </div>

          <!-- 현재달 + 오늘 -->
          <div th:if="${cell.currentMonth and cell.today and !cell.checked}"
               class="monthCell today">
            <div class="monthDay" th:text="${cell.dayOfMonth}">1</div>
            <div class="checkDot"></div>
          </div>

          <!-- 현재달 + 체크 -->
          <div th:if="${cell.currentMonth and !cell.today and cell.checked}"
               class="monthCell checked">
            <div class="monthDay" th:text="${cell.dayOfMonth}">1</div>
          </div>

          <!-- 현재달 + 일반 날짜 -->
          <div th:if="${cell.currentMonth and !cell.today and !cell.checked}"
               class="monthCell">
            <div class="monthDay" th:text="${cell.dayOfMonth}">1</div>
          </div>

        </th:block>

      </div>
    </div>
  </div>

  <!-- 하단 버튼 -->
  <div class="actions">
    <form th:action="@{/okr/kr/{id}/toggle-today(id=${detail.keyResultId})}" method="post">
      <button type="submit" class="btn ok">오늘 체크/해제</button>
    </form>

    <a th:href="@{/okr}" class="btn">OKR 목록으로</a>
  </div>

  <p class="muted" style="margin-top:10px;">※ 오늘 날짜만 체크/해제가 가능합니다.</p>

</div>
</body>
</html>
