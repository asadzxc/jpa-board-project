<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>OKR 보관함</title>
  <link rel="stylesheet" th:href="@{/css/pages/okr-archive.css}">
</head>
<body class="page-archive">

<div class="container">
  <div class="wrap">

    <div class="page-head">
      <div>
        <h1 class="page-title">OKR 보관함</h1>
        <p class="page-sub">완료했거나 잠시 내려둔 목표를 다시 꺼낼 수 있습니다.</p>
      </div>

      <a th:href="@{/okr}" class="btn">진행중 OKR로</a>
    </div>

    <div th:if="${#lists.isEmpty(objectives)}" class="empty-box">
      보관된 OKR이 없습니다.
    </div>

    <div class="archive-list" th:if="${!#lists.isEmpty(objectives)}">

      <div class="archive-card" th:each="obj : ${objectives}">
        <div class="obj-top">
          <div class="obj-left">
            <h3 class="obj-title" th:text="${obj.title}">Objective Title</h3>
            <p class="obj-desc" th:text="${obj.description}">desc</p>
          </div>

          <div class="obj-right">
            <form th:action="@{/okr/{id}/restore(id=${obj.id})}" method="post">
              <button type="submit" class="btn ok">복원하기</button>
            </form>
          </div>
        </div>

        <div class="obj-progress">
          <div class="obj-progress-top">
            <div class="obj-progress-title">
              <strong>분기 진행률</strong>
              <span th:text="${obj.quarterProgressPercent}">0</span>%
            </div>

            <div class="obj-progress-meta">
              <span>달성률 <strong th:text="${obj.achievementPercent}">0</strong>%</span>
            </div>
          </div>

          <div class="obj-progress-bar">
            <div class="obj-progress-fill"
                 th:style="'width:' + ${obj.quarterProgressPercent} + '%'"></div>
          </div>

          <div class="mini-graphs">
            <div class="mini-graph">
              <span class="mini-label">달성률</span>
              <span class="mini-bar">
                <span class="mini-fill"
                      th:style="'width:' + ${obj.achievementPercent} + '%'"></span>
              </span>
              <span class="mini-percent">
                <span th:text="${obj.achievementPercent}">0</span>%
              </span>
            </div>
          </div>
        </div>

      </div>

    </div>

  </div>
</div>

</body>
</html>
