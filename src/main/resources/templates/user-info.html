<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 정보</title>

    <link rel="stylesheet" th:href="@{/css/base.css?v=20260303}">
    <link rel="stylesheet" th:href="@{/css/components.css?v=20260303}">
    <link rel="stylesheet" th:href="@{/css/theme-forest.css?v=20260303}">
    <link rel="stylesheet" th:href="@{/css/pages/auth.css?v=20260303}">
</head>

<body class="theme-forest">
<div class="auth-wrap">
    <div class="card auth-card">
        <h1 class="card-title">내 정보</h1>
        <p class="card-subtitle">회원 정보를 확인하세요</p>

        <div class="form">
            <div class="form-row">
                <label>아이디</label>
                <div th:text="${user.username}"></div>
            </div>

            <div class="form-row">
                <label>이름</label>
                <div th:text="${user.name}"></div>
            </div>

            <div class="form-row">
                <label>생년월일</label>
                <div th:text="${user.birthDate}"></div>
            </div>
        </div>

        <div class="row mt12">
            <a class="btn primary" th:href="@{/}">홈으로</a>
        </div>
    </div>
</div>
</body>
</html>
