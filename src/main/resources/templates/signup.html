<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>

    <link rel="stylesheet" th:href="@{/css/base.css?v=20260303}">
    <link rel="stylesheet" th:href="@{/css/components.css?v=20260303}">
    <link rel="stylesheet" th:href="@{/css/theme-forest.css?v=20260303}">
    <link rel="stylesheet" th:href="@{/css/pages/auth.css?v=20260303}">
</head>

<body class="theme-forest">
<div class="auth-wrap">
    <div class="card auth-card">
        <h1 class="card-title">회원가입</h1>
        <p class="card-subtitle">새 계정을 만들어 OKR 서비스를 시작하세요</p>

        <form th:action="@{/signup}" th:object="${user}" method="post" class="form">
            <div class="form-row">
                <label for="username">아이디</label>
                <input type="text" id="username" th:field="*{username}" required>
            </div>

            <div class="form-row">
                <label for="name">이름</label>
                <input type="text" id="name" th:field="*{name}" required>
            </div>

            <div class="form-row">
                <label for="birthDate">생년월일</label>
                <input type="date" id="birthDate" th:field="*{birthDate}" required>
            </div>

            <div class="form-row">
                <label for="password">비밀번호</label>
                <input type="password" id="password" th:field="*{password}" required autocomplete="new-password">
                <p class="hint">비밀번호는 8자 이상, 영문 1개 이상, 숫자 1개 이상이어야 합니다.</p>
            </div>

            <div class="row mt12">
                <button type="submit" class="btn primary">가입하기</button>
                <a class="right" th:href="@{/login}">로그인</a>
            </div>
        </form>

        <p class="error" th:if="${message}" th:text="${message}"></p>
    </div>
</div>
</body>
</html>
