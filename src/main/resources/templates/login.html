<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/base.css?v=20260303}">
    <link rel="stylesheet" th:href="@{/css/components.css?v=20260303}">
    <link rel="stylesheet" th:href="@{/css/theme-forest.css?v=20260303}">
    <link rel="stylesheet" th:href="@{/css/pages/auth.css?v=20260303}">
</head>

<body class="theme-forest">
<div class="auth-wrap">
    <div class="card auth-card">
        <h1 class="card-title">로그인</h1>
        <p class="card-subtitle">아이디와 비밀번호를 입력해주세요</p>

        <form th:action="@{/login}" method="post" class="form">
            <div class="form-row">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-row">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="row mt12">
                <button type="submit" class="btn primary">로그인</button>
                <a class="right" th:href="@{/signup}">회원가입</a>
            </div>
        </form>

        <p class="error" th:if="${error}" th:text="${error}"></p>
    </div>
</div>
</body>
</html>
